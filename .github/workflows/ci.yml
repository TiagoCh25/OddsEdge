name: ci

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: bet_agent/requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r bet_agent/requirements-dev.txt

      - name: Ruff
        run: python -m ruff check --no-cache bet_agent

      - name: Pytest
        run: python -m pytest -q bet_agent/tests

      - name: Docker build
        run: docker build -t bet-agent:test .
